name: Container Builder Shim - release build

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    tags:
      - "*.*.*"

jobs:
  build:
    if: startsWith(github.ref, 'refs/tags/')
    name: Invoke build and release
    uses: ./.github/workflows/common.yml
    permissions:
      contents: read
  image: 
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build]
    permissions:
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - name: Login to GitHub container registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
      - name: Set up docker-buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - name: Build Dockerfile and push image
        id: build-image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          platforms: linux/arm64
          push: true
          provenance: mode=max
          sbom: true
          tags: ghcr.io/${{ github.repository_owner }}/container-builder-shim/builder:${{ github.ref_name }}
          build-args: |
            GIT_TAG=${{ github.ref_name }}
            SOURCE_REPOSITORY=https://github.com/${{ github.repository }}
      - name: Report builder image digest
        shell: bash
        run: |
          printf 'builder image digest: %s\n' '${{ steps.build-image.outputs.digest }}'

  release:
    if: startsWith(github.ref, 'refs/tags/')
    name: Publish release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: image
    permissions:
      contents: write
    steps:
      - name: Create release notes
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          token: ${{ github.token }}
          name: ${{ github.ref_name }}
          draft: true
          make_latest: false
          prerelease: true
          generate_release_notes: true
